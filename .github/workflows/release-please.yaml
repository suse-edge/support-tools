name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write # Needed to create releases and update files
  pull-requests: write # Needed to create Release PRs
  issues: write # Needed to create labels https://github.com/googleapis/release-please-action/issues/1105#issuecomment-2780292262

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check if a new release was created for components-versions
        if: ${{ steps.release.outputs.components-versions_release_created }}
        run: |
          echo "Release created for components-versions: ${{ steps.release.outputs.components-versions_tag_name }}"
          echo "Release body for components-versions:"
          echo "${{ steps.release.outputs.components-versions_release_body }}"
